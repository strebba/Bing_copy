version: "3.9"

services:
  # ── Trading Bot ──────────────────────────────────────────────────────────────
  wagmi-bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: wagmi-ct-bot
    restart: unless-stopped
    env_file:
      - ../.env
    volumes:
      - ../logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - wagmi-net
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: wagmi-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wagmi-net

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: wagmi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: wagmi
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wagmi_secure_pwd}
      POSTGRES_DB: wagmi_ct
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wagmi -d wagmi_ct"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wagmi-net

  # ── Prometheus ───────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: wagmi-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - wagmi-net

  # ── Grafana ──────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.1.0
    container_name: wagmi-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-wagmi_grafana}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - wagmi-net

volumes:
  redis_data:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  wagmi-net:
    driver: bridge
