name: CI

on:
  push:
    branches: ["main", "claude/**", "feature/**"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run unit tests with coverage
        run: |
          pytest tests/unit/ \
            --cov=strategy \
            --cov=risk \
            --cov=analytics \
            --cov=backtest \
            --cov-report=term-missing \
            --cov-fail-under=85 \
            -v

      - name: Run stress tests
        run: |
          pytest tests/stress/ -v

      - name: Integration tests (demo only)
        run: |
          pytest tests/integration/ -v
        env:
          DEMO_MODE: "true"
        continue-on-error: true   # Skip if no API keys in secrets

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linters
        run: pip install ruff mypy

      - name: Ruff lint
        run: ruff check . --select E,W,F --ignore E501

      - name: Type check (non-blocking)
        run: mypy --ignore-missing-imports strategy/ risk/ analytics/
        continue-on-error: true

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t wagmi-ct-bot:ci .
